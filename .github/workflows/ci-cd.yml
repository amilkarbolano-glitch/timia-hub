name: CI/CD — Timia Hub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permisos para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── BUILD ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build:client
        env:
          GITHUB_PAGES: 'true'
          VITE_API_URL: ${{ secrets.VITE_API_URL || '' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ─── DEPLOY a GitHub Pages (solo en push a main) ──────────────────────────
  deploy:
    name: Deploy → GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Enable GitHub Pages via API
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.updateInformationAboutPagesSite({
                owner: context.repo.owner,
                repo: context.repo.repo,
                build_type: 'workflow'
              });
              console.log('Pages set to GitHub Actions build type');
            } catch(e) {
              try {
                await github.rest.repos.createPagesSite({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  build_type: 'workflow'
                });
                console.log('Pages created with GitHub Actions build type');
              } catch(e2) {
                console.log('Pages already configured:', e2.message);
              }
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
